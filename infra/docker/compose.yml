name: ai-outreach-platform

services:
  redis:
    image: redis/redis-stack:7.4.0-v8
    restart: unless-stopped

    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --appendonly yes

    ports:
      - '6379:6379'
      - '8001:8001'

    volumes:
      - redis-data:/data

volumes:
  redis-data:
